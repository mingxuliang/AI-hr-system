prompts:
  analyze_resume:
    system: "你是一个专业的招聘专家，擅长简历分析和人岗匹配。"
    user: |
      请分析以下简历内容，并根据岗位描述进行匹配度评估。
      
      岗位描述:
      {position_description}
      
      简历内容:
      {resume_text}
      
      请返回 JSON 格式的结果，只包含以下基本信息和评估结果，不需要详细的项目和工作经历:
      - candidate_name: 候选人姓名
      - contact: 联系方式
      - email: 邮箱
      - years_of_experience: 工作年限 (数字，例如 5)
      - highest_degree: 最高学历 (例如 本科)
      - school: 毕业院校 (最高学历)
      - major: 专业
      - recent_company: 最近工作单位，注意，简历解析的时候可能把水印上的文字也加上了，注意分辨，不要把水印上的公司当做最近工作单位
      - match_score: 匹配度评分 (0-100)
      - screening_result: 初筛结果 (passed/rejected/waitlist)
      - ai_review: 详细的 AI 评审意见 (请使用 Markdown 格式，包含 '### ✅ 优势'、'### ⚠️ 不足'、'### 💡 综合建议' 三个部分)

  generate_resume_markdown:
    system: "你是一个专业的简历优化专家。"
    user: |
      请将以下简历内容整理为 Markdown 格式，要求美观、易读、结构清晰。
      
      简历内容:
      {resume_text}
      
      请包含以下部分（如果有）:
      - 个人信息 (使用 H2 标题，如 ## 👤 个人信息)
      - 教育背景 (使用 H2 标题，如 ## 🎓 教育背景)
      - 工作经历 (使用 H2 标题，如 ## 💼 工作经历)
      - 项目经历 (使用 H2 标题，如 ## 🚀 项目经历)
      - 技能清单 (使用 H2 标题，如 ## 🛠 技能清单)
      - 其他信息 (使用 H2 标题)
      
      请直接返回 Markdown 文本，不要包含 Markdown 代码块标记（如 ```markdown ... ```）。

  generate_interview_questions:
    system: "你是一个资深的技术面试官。"
    user: |
      请根据以下简历、岗位描述以及参考题库，生成一套面试题。
      
      岗位描述:
      {position_description}
      
      简历信息:
      {resume_data}
      
      参考题库内容 (如果有):
      {question_bank_content}
      
      请生成 {count} 道面试题，综合考虑岗位要求、候选人经历和参考题库。
      
      包含:
      - 题目标题 (简短概括，如项目名称或技术点)
      - 题目内容 (详细的问题描述，简洁清晰，重点突出)
      - 简历关联 (指出该问题关联简历中的哪段经历或技能)
      - 参考答案 (包含理想回答要点、个人职责、技术决策、具体贡献)
      - 评分标准 (优秀5分、良好4分、一般3分、较差2分 的具体标准)
      - 追问方向 (2-3个追问问题)
      - 难度 (junior/intermediate/senior)
      - 类型 (technical/project/behavioral)
      
      要求：
      1. 题目内容要具体明确，避免宽泛的提问。
      2. 如果是技术问题，最好结合候选人的项目经历进行提问。
      3. 参考答案和评分标准要条理清晰，使用 Markdown 列表格式。
      
      请返回 JSON 对象，格式如下：
      {{
        "questions": [
          {{
            "title": "...",
            "content": "...",
            "resume_association": "...",
            "reference_answer": "...",
            "grading_criteria": "优秀(5分):...\\n良好(4分):...\\n一般(3分):...\\n较差(2分):...",
            "follow_up": ["追问1", "追问2"],
            "difficulty": "...",
            "type": "..."
          }}
        ]
      }}

  generate_interview_evaluation:
    system: "你是一个资深的面试官，正在进行面试复盘和综合评估。"
    user: |
      请根据以下面试详细信息，生成一份专业的面试综合评价报告。
      
      ### 1. 面试题目及标准
      {questions}
      
      ### 2. 面试官评分概览
      {scores}
      
      ### 3. 面试官详细评语 (按题目分组)
      {panel_details}
      
      ### 4. 候选人回答录音转写 (部分题目可能有)
      {transcripts}
      
      ### 5. 综合总分
      {total_score}
      
      请综合考虑面试官的评分、具体评语以及候选人的实际回答内容（如果有转写文本），生成一份客观、全面的评价。
      
      **要求**：
      1. **综合分析**：不要仅复述分数，要结合评语和候选人回答内容分析其技术深度、表达能力和项目经验。
      2. **回答质量评估**：如果提供了候选人的回答转写，请特别点评其回答的逻辑性、准确性和完整性。
      3. **优缺点总结**：明确列出候选人的主要优势和待改进之处。
      4. **最终建议**：给出明确的录用建议。
      
      请返回 JSON 格式，包含:
      - evaluation: 综合评价内容 (Markdown 格式，包含 '### 🌟 综合表现'、'### 💬 回答质量点评'、'### ✅ 优势'、'### ⚠️ 不足' 四个部分)
      - suggestion: 录用建议 (passed/rejected/waitlist)

  generate_coding_test_evaluation:
    system: "你是一个资深算法面试官，擅长评估候选人代码质量与算法能力。"
    user: |
      请根据以下信息生成对候选人笔试代码的评价（面向面试复盘与录用决策）。

      ### 1. 题目
      标题：{title}
      描述：
      {description}

      ### 2. 候选人代码
      语言：{language}
      代码：
      {code}

      ### 3. 测试用例运行结果
      {run_result}

      请返回 JSON 对象，仅包含：
      - evaluation: Markdown 文本，包含以下部分：
        - ### ✅ 正确性与边界情况
        - ### ⚙️ 复杂度与性能
        - ### 🧩 代码风格与可维护性
        - ### 💡 改进建议

  generate_jd:
    system: "你是一个专业的招聘专家，擅长撰写岗位描述和任职要求。"
    user: |
      请根据以下信息，生成一份专业的岗位描述（JD）。

      ### 基本信息
      - 岗位名称：{title}
      - 所属部门：{department}
      - 工作地点：{location}
      - 薪资范围：{salary_range}
      - 关键词/特殊要求：{keywords}

      请返回 JSON 对象，包含以下字段：
      - description: 岗位职责描述（使用 Markdown 格式，包含 5-8 条职责，每条以 "- " 开头）
      - requirements: 任职要求（使用 Markdown 格式，包含学历、经验、技能等要求，分点列出）

      要求：
      1. 职责描述要具体、可量化，避免空泛的表述
      2. 任职要求要明确学历、工作年限、核心技能等硬性条件
      3. 根据岗位名称和关键词，添加相关的专业技能要求
      4. 语言要专业、简洁，符合企业招聘风格
